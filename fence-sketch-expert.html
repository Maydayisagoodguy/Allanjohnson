<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expert Fence Sketch</title>
    <style>
      body {
        margin: 0;
        background: #f5f7f7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        color: #172322;
        font-size: clamp(1.5rem, 4vw, 2.6rem);
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        border-radius: 8px;
        padding: 0 14px;
        color: #ffffff;
        background: #16845f;
        font-weight: 800;
        text-decoration: none;
      }

      .frame {
        overflow: auto;
        border: 1px solid #d8e1df;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 42px rgba(20, 32, 30, 0.08);
      }

      img {
        display: block;
        width: 100%;
        min-width: 920px;
        height: auto;
      }

      p {
        color: #657371;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="toolbar">
        <h1>Expert Field Sketch Version</h1>
        <a href="fence-sketch-expert.svg" download>Download SVG Image</a>
      </div>
      <p>
        This version follows the form of your handwritten sketch more closely:
        road on the left, fenced petrol pump plot in the middle, B-points around
        the boundary, and N-points inside the plot.
      </p>
      <div class="frame">
        <img src="fence-sketch-expert.svg" alt="Expert fence sketch based on handwritten layout" />
      </div>
    </main>
  </body>
</html>
