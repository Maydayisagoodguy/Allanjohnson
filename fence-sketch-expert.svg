<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">MN Moopen Petrol Pump Expert Fence Sketch</title>
  <desc id="desc">A professional rough sketch of the petrol pump geofence based on the user's hand-drawn layout and supplied B and N coordinate labels.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17312d" flood-opacity="0.13"/>
    </filter>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1d2f2c"/>
    </marker>
    <style>
      .page-bg { fill: #f4f0df; }
      .paper-line { stroke: #d8cfb1; stroke-width: 2; opacity: 0.65; }
      .road { fill: #d7dde0; stroke: #285d8f; stroke-width: 5; }
      .road-mark { stroke: #285d8f; stroke-width: 5; stroke-linecap: round; opacity: 0.9; }
      .road-label { fill: #285d8f; font: 800 28px Arial, sans-serif; }
      .fence-fill { fill: rgba(24, 124, 88, 0.09); }
      .fence-main { fill: none; stroke: #124f43; stroke-width: 7; stroke-linejoin: round; stroke-linecap: round; }
      .fence-second { fill: none; stroke: #1b8067; stroke-width: 3; stroke-dasharray: 16 12; stroke-linejoin: round; stroke-linecap: round; }
      .inner-guide { fill: none; stroke: #4b6c67; stroke-width: 3; stroke-dasharray: 10 12; opacity: 0.75; }
      .nozzle-line { fill: none; stroke: #b36b00; stroke-width: 5; stroke-dasharray: 12 14; stroke-linecap: round; }
      .label { fill: #12302b; font: 900 25px Arial, sans-serif; paint-order: stroke; stroke: #f4f0df; stroke-width: 7; stroke-linejoin: round; }
      .small-label { fill: #49615e; font: 800 20px Arial, sans-serif; paint-order: stroke; stroke: #f4f0df; stroke-width: 5; stroke-linejoin: round; }
      .note { fill: #49615e; font: 700 19px Arial, sans-serif; }
      .title { fill: #12221f; font: 900 42px Arial, sans-serif; }
      .subtitle { fill: #526360; font: 700 23px Arial, sans-serif; }
      .boundary-point { fill: #16845f; stroke: #ffffff; stroke-width: 5; }
      .side-point { fill: #275db8; stroke: #ffffff; stroke-width: 5; }
      .nozzle-point { fill: #a86400; stroke: #ffffff; stroke-width: 5; }
      .building { fill: #ffffff; stroke: #889b97; stroke-width: 3; rx: 10; }
      .building-label { fill: #263b38; font: 800 18px Arial, sans-serif; }
      .legend-box { fill: #fffaf0; stroke: #d2c7a8; stroke-width: 2; }
      .legend-text { fill: #324642; font: 700 18px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1400" height="1000" class="page-bg"/>
  <g filter="url(#paperNoise)">
    <rect width="1400" height="1000" fill="transparent"/>
  </g>

  <g opacity="0.75">
    <line x1="0" y1="115" x2="1400" y2="115" class="paper-line"/>
    <line x1="0" y1="165" x2="1400" y2="165" class="paper-line"/>
    <line x1="0" y1="215" x2="1400" y2="215" class="paper-line"/>
    <line x1="0" y1="265" x2="1400" y2="265" class="paper-line"/>
    <line x1="0" y1="315" x2="1400" y2="315" class="paper-line"/>
    <line x1="0" y1="365" x2="1400" y2="365" class="paper-line"/>
    <line x1="0" y1="415" x2="1400" y2="415" class="paper-line"/>
    <line x1="0" y1="465" x2="1400" y2="465" class="paper-line"/>
    <line x1="0" y1="515" x2="1400" y2="515" class="paper-line"/>
    <line x1="0" y1="565" x2="1400" y2="565" class="paper-line"/>
    <line x1="0" y1="615" x2="1400" y2="615" class="paper-line"/>
    <line x1="0" y1="665" x2="1400" y2="665" class="paper-line"/>
    <line x1="0" y1="715" x2="1400" y2="715" class="paper-line"/>
    <line x1="0" y1="765" x2="1400" y2="765" class="paper-line"/>
    <line x1="0" y1="815" x2="1400" y2="815" class="paper-line"/>
    <line x1="0" y1="865" x2="1400" y2="865" class="paper-line"/>
  </g>

  <text x="72" y="74" class="title">MN Moopen Petrol Pump - Field Geofence Sketch</text>
  <text x="74" y="108" class="subtitle">Professional rough sketch following the handwritten boundary layout and supplied coordinate point names</text>

  <g filter="url(#softShadow)">
    <path d="M120 132 C92 315 82 552 116 885 L246 876 C215 576 222 340 260 145 Z" class="road"/>
    <line x1="178" y1="180" x2="166" y2="830" class="road-mark" stroke-dasharray="80 62"/>
    <line x1="233" y1="170" x2="218" y2="840" class="road-mark" stroke-dasharray="80 62" opacity="0.55"/>
    <text x="82" y="910" class="road-label">Road / NH side</text>
  </g>

  <g filter="url(#softShadow)">
    <polygon points="430,165 760,205 850,825 345,800" class="fence-fill"/>
    <path d="M430 165 L760 205 L850 825 L345 800 Z" class="fence-main"/>
    <path d="M448 185 L740 220 L827 802 L365 780 Z" class="fence-second"/>

    <path d="M430 165 C420 330 402 565 345 800" class="inner-guide"/>
    <path d="M760 205 C780 365 805 580 850 825" class="inner-guide"/>
    <path d="M430 165 C520 184 642 197 760 205" class="inner-guide"/>
    <path d="M345 800 C482 786 680 788 850 825" class="inner-guide"/>

    <rect x="905" y="292" width="145" height="76" rx="10" class="building"/>
    <text x="930" y="338" class="building-label">Office</text>
    <rect x="884" y="478" width="175" height="76" rx="10" class="building"/>
    <text x="908" y="523" class="building-label">Cash Counter</text>
    <rect x="820" y="655" width="155" height="76" rx="10" class="building"/>
    <text x="844" y="701" class="building-label">Restroom</text>

    <path d="M575 250 C560 360 540 475 515 610 C500 685 478 735 455 780" class="nozzle-line"/>
  </g>

  <!-- Main boundary corner points -->
  <circle cx="430" cy="165" r="13" class="boundary-point"/>
  <text x="385" y="143" class="label">B1</text>
  <circle cx="760" cy="205" r="13" class="boundary-point"/>
  <text x="782" y="198" class="label">B2</text>
  <circle cx="850" cy="825" r="13" class="boundary-point"/>
  <text x="865" y="855" class="label">B3</text>
  <circle cx="345" cy="800" r="13" class="boundary-point"/>
  <text x="292" y="838" class="label">B4</text>

  <!-- Right side / opposite side points -->
  <circle cx="785" cy="365" r="10" class="side-point"/>
  <text x="803" y="369" class="label">B5</text>
  <circle cx="802" cy="545" r="10" class="side-point"/>
  <text x="823" y="552" class="label">B6</text>
  <circle cx="820" cy="652" r="10" class="side-point"/>
  <text x="840" y="662" class="label">B7</text>
  <circle cx="809" cy="646" r="10" class="side-point"/>
  <text x="755" y="646" class="label">B8</text>
  <circle cx="742" cy="730" r="10" class="side-point"/>
  <text x="760" y="747" class="label">B9</text>

  <!-- Road side points -->
  <circle cx="382" cy="635" r="10" class="side-point"/>
  <text x="320" y="642" class="label">B10</text>
  <circle cx="394" cy="522" r="10" class="side-point"/>
  <text x="332" y="530" class="label">B11</text>
  <circle cx="408" cy="405" r="10" class="side-point"/>
  <text x="345" y="414" class="label">B12</text>
  <circle cx="420" cy="288" r="10" class="side-point"/>
  <text x="358" y="296" class="label">B13</text>

  <!-- Nozzle points inside the plot -->
  <circle cx="575" cy="250" r="11" class="nozzle-point"/>
  <text x="598" y="252" class="label">N6</text>
  <circle cx="555" cy="360" r="11" class="nozzle-point"/>
  <text x="578" y="363" class="label">N5</text>
  <circle cx="535" cy="455" r="11" class="nozzle-point"/>
  <text x="558" y="458" class="label">N4</text>
  <circle cx="515" cy="545" r="11" class="nozzle-point"/>
  <text x="538" y="549" class="label">N3</text>
  <circle cx="492" cy="640" r="11" class="nozzle-point"/>
  <text x="515" y="645" class="label">N2</text>
  <circle cx="455" cy="725" r="11" class="nozzle-point"/>
  <text x="480" y="731" class="label">N1</text>

  <g>
    <line x1="1160" y1="144" x2="1160" y2="232" stroke="#1d2f2c" stroke-width="5" marker-start="url(#arrow)"/>
    <text x="1138" y="265" class="label">N</text>
  </g>

  <g>
    <rect x="990" y="780" width="330" height="148" rx="10" class="legend-box"/>
    <circle cx="1025" cy="820" r="10" class="boundary-point"/>
    <text x="1050" y="827" class="legend-text">Main outer fence corners</text>
    <circle cx="1025" cy="862" r="10" class="side-point"/>
    <text x="1050" y="869" class="legend-text">Additional B reference points</text>
    <circle cx="1025" cy="904" r="10" class="nozzle-point"/>
    <text x="1050" y="911" class="legend-text">Nozzle / dispenser points</text>
  </g>

  <g>
    <text x="72" y="955" class="note">Draft only: final geofence should use the confirmed coordinate polygon. This image follows the field sketch orientation for easy discussion.</text>
  </g>
</svg>
